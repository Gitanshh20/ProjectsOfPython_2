<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration From</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
<body>
    <div class="details-from">
        <h1>Registration From</h1>
            <form action="script.js">
                <label for="Name">Full Name</label>
                <input type="text" id="Name" required placeholder="Enter Your Name"> 
                
                <label for="email">Email-Address</label>
                <input type="text" id="email" required placeholder="Enter Your Email-Address">  

                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter Your Password">

                <label for="Address">Address</label>
                <input type="text" id="Address" required placeholder="Enter Your Address">
                
                <button class="but" append = "but">
                    Submit
                </button>
            </form>
    </div>
</body>
</html>
